name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: darwin-arm64
          # Build on ubuntu-22.04 (glibc 2.35) so the binary runs on 22.04+.
          - os: ubuntu-22.04
            target: linux-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Build runtime with PyInstaller
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller -e .
          pyinstaller \
            --name codex-chronicle \
            --onedir \
            --clean \
            --noupx \
            --noconfirm \
            --log-level WARN \
            --collect-submodules codex_chronicle \
            codex_chronicle/_entrypoint.py

      - name: Ad-hoc codesign (macOS)
        if: runner.os == 'macOS'
        run: |
          codesign --force --sign - --timestamp=none "dist/codex-chronicle/codex-chronicle"
          codesign --verify --strict --verbose=2 "dist/codex-chronicle/codex-chronicle"

      - name: Smoke test frozen binary
        run: |
          ./dist/codex-chronicle/codex-chronicle --version
          ln -sf codex-chronicle dist/codex-chronicle/codex-chronicle-hook
          echo '{}' | ./dist/codex-chronicle/codex-chronicle-hook
          ls -la dist/codex-chronicle/codex-chronicle-hook

      - name: Package tarball
        run: |
          cd dist
          mv codex-chronicle codex-chronicle-${{ matrix.target }}
          tar -czf codex-chronicle-${{ matrix.target }}.tar.gz codex-chronicle-${{ matrix.target }}
          if [ "${{ runner.os }}" = "macOS" ]; then
            shasum -a 256 codex-chronicle-${{ matrix.target }}.tar.gz > codex-chronicle-${{ matrix.target }}.tar.gz.sha256
          else
            sha256sum codex-chronicle-${{ matrix.target }}.tar.gz > codex-chronicle-${{ matrix.target }}.tar.gz.sha256
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: codex-chronicle-${{ matrix.target }}
          path: |
            dist/codex-chronicle-${{ matrix.target }}.tar.gz
            dist/codex-chronicle-${{ matrix.target }}.tar.gz.sha256
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List assets
        run: ls -la artifacts/

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/codex-chronicle-*.tar.gz
            artifacts/codex-chronicle-*.tar.gz.sha256
          generate_release_notes: true
          fail_on_unmatched_files: true
